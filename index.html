<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Generator NDA PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html-docx-js/0.3.1/html-docx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#0f172a;color:#e2e8f0}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px}
input,textarea,select{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:none}
button{padding:10px 14px;margin-top:10px;border:none;border-radius:8px;background:#38bdf8;font-weight:bold}
.help{font-size:12px;color:#94a3b8;margin-top:4px}
.preview{white-space:pre-wrap;background:#020617;padding:15px;border-radius:10px}
</style>
</head>

<body>
<div class="container">
<h1>Generator NDA PRO</h1>

<div class="card">

<label>Rodzaj umowy</label>
<select id="type">
<option>jedna ze stron</option>
<option>obie strony</option>
</select>
<div class="help">Kto ma obowiązek poufności</div>

<label>Miejsce zawarcia</label>
<input id="place">
<div class="help">Miasto podpisania umowy</div>

<label>Cel</label>
<textarea id="purpose"></textarea>
<div class="help">Po co zawierana jest umowa</div>

<h3>Strona 1</h3>
<input id="p1" placeholder="Dane strony 1">

<h3>Strona 2</h3>
<input id="p2" placeholder="Dane strony 2">

<label>Zakres</label>
<textarea id="scope"></textarea>

<label>Wyłączenia</label>
<textarea id="exclusions"></textarea>

<label>Forma</label>
<input id="formInfo">

<label>Czas trwania</label>
<input id="duration">

<label>Zwrot danych</label>
<textarea id="return"></textarea>

<label>Sąd</label>
<input id="court">

<label>RODO</label>
<textarea id="rodo"></textarea>

<button onclick="generate()">Generuj</button>
<button onclick="exportDOCX()">DOCX</button>
<button onclick="exportPDF()">PDF</button>

</div>

<br>

<div class="preview" id="preview"></div>

</div>

<script>

function today(){
  return new Date().toLocaleDateString('pl-PL');
}

function val(id){
  return document.getElementById(id).value || '[uzupełnij]';
}

function validate(){
  if(!val('place') || !val('purpose')){
    alert("Uzupełnij podstawowe dane!");
    return false;
  }
  return true;
}

function generate(){

if(!validate()) return;

document.getElementById("preview").innerText =
`UMOWA NDA

Data: ${today()}
Miejsce: ${val("place")}

Rodzaj: ${val("type")}

Strony:
1. ${val("p1")}
2. ${val("p2")}

Cel:
${val("purpose")}

Zakres:
${val("scope")}

Wyłączenia:
${val("exclusions")}

Forma:
${val("formInfo")}

Czas:
${val("duration")}

Zwrot danych:
${val("return")}

Sąd:
${val("court")}

RODO:
${val("rodo")}
`;
}

function exportDOCX(){
generate();

const html = `
<html><body style="font-family:Arial;">
${document.getElementById("preview").innerHTML.replace(/\n/g,"<br>")}
</body></html>`;

const blob = window.htmlDocx.asBlob(html);
saveAs(blob, "NDA.docx");
}

async function exportPDF(){
generate();

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

const text = document.getElementById("preview").innerText;

// 🔥 NAJWAŻNIEJSZA ZMIANA (naprawa polskich znaków)
doc.setFont("Times","Normal");

const lines = doc.splitTextToSize(text, 180);

let y = 10;

lines.forEach(line=>{
  if(y > 280){
    doc.addPage();
    y = 10;
  }
  doc.text(line, 10, y);
  y += 7;
});

doc.save("NDA.pdf");
}

</script>

</body>
</html>
