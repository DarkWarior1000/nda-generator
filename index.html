<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generator NDA PRO</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-docx-js/0.3.1/html-docx.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    body { font-family: Inter, sans-serif; margin:0; background:#0f172a; color:#e2e8f0; }
    .container { max-width:1400px; margin:auto; padding:20px; }
    h1 { font-size:32px; margin-bottom:6px; }
    .lead { color:#94a3b8; margin:0 0 18px; }
    .grid { display:grid; grid-template-columns:1.08fr 0.92fr; gap:20px; }
    .card { background:#1e293b; padding:20px; border-radius:16px; }
    .section-title { margin:18px 0 10px; font-size:18px; }
    .subcard { background:#0f172a; border:1px solid #334155; padding:16px; border-radius:14px; margin-top:10px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .full { grid-column:1 / -1; }
    input, textarea, select { width:100%; padding:12px; border-radius:10px; border:none; margin-top:6px; }
    .help { font-size:12px; color:#94a3b8; margin-top:4px; }
    button { padding:10px 14px; border:none; border-radius:10px; background:#38bdf8; color:#0f172a; font-weight:bold; cursor:pointer; }
    .preview { white-space:pre-wrap; font-size:14px; }
  </style>
</head>

<body>
<div class="container">
  <h1>Generator NDA PRO</h1>
  <p class="lead">Generator umów NDA z zapisem danych i eksportem</p>

  <div class="grid">

    <div class="card">

      <label>Rodzaj umowy</label>
      <select id="type">
        <option>jedna ze stron</option>
        <option>obie strony</option>
      </select>

      <label>Miejsce</label>
      <input id="place">

      <label>Cel</label>
      <textarea id="purpose"></textarea>

      <h3>Strona 1</h3>
      <select id="party1Kind" onchange="togglePartyFields()">
        <option value="osoba fizyczna">osoba fizyczna</option>
        <option value="osoba prawna">osoba prawna</option>
      </select>

      <div id="party1Person">
        <input id="party1FirstName" placeholder="Imię">
        <input id="party1LastName" placeholder="Nazwisko">
        <input id="party1Address" placeholder="Adres">
        <input id="party1Pesel" placeholder="PESEL">
      </div>

      <div id="party1Company" style="display:none;">
        <input id="party1CompanyName" placeholder="Firma">
        <input id="party1CompanyAddress" placeholder="Adres">
        <input id="party1Nip" placeholder="NIP">
        <input id="party1Regon" placeholder="REGON">
        <input id="party1Representative" placeholder="Reprezentant">
      </div>

      <h3>Strona 2</h3>
      <select id="party2Kind" onchange="togglePartyFields()">
        <option value="osoba fizyczna">osoba fizyczna</option>
        <option value="osoba prawna">osoba prawna</option>
      </select>

      <div id="party2Person">
        <input id="party2FirstName" placeholder="Imię">
        <input id="party2LastName" placeholder="Nazwisko">
        <input id="party2Address" placeholder="Adres">
        <input id="party2Pesel" placeholder="PESEL">
      </div>

      <div id="party2Company" style="display:none;">
        <input id="party2CompanyName" placeholder="Firma">
        <input id="party2CompanyAddress" placeholder="Adres">
        <input id="party2Nip" placeholder="NIP">
        <input id="party2Regon" placeholder="REGON">
        <input id="party2Representative" placeholder="Reprezentant">
      </div>

      <textarea id="scope" placeholder="Zakres"></textarea>
      <textarea id="exclusions" placeholder="Wyłączenia"></textarea>
      <input id="duration" placeholder="Czas trwania">

      <button onclick="generate()">Generuj</button>
      <button onclick="exportDOCX()">DOCX</button>
      <button onclick="exportPDF()">PDF</button>

    </div>

    <div class="card">
      <div id="preview" class="preview"></div>
    </div>

  </div>
</div>

<script>
function val(id){ return document.getElementById(id).value || '[uzupełnij]'; }

function togglePartyFields(){
  document.getElementById('party1Person').style.display = val('party1Kind')==='osoba fizyczna'?'block':'none';
  document.getElementById('party1Company').style.display = val('party1Kind')==='osoba prawna'?'block':'none';
  document.getElementById('party2Person').style.display = val('party2Kind')==='osoba fizyczna'?'block':'none';
  document.getElementById('party2Company').style.display = val('party2Kind')==='osoba prawna'?'block':'none';
}

function generate(){
  document.getElementById('preview').textContent =
`UMOWA NDA

${val('party1FirstName')} ${val('party1LastName')}
z
${val('party2FirstName')} ${val('party2LastName')}

Cel:
${val('purpose')}`;
}

function exportDOCX(){
  const content = document.getElementById('preview').textContent
    .replace(/\n/g, '<br>');
  const html = `<html><body>${content}</body></html>`;
  const blob = window.htmlDocx.asBlob(html);
  saveAs(blob, 'nda.docx');
}

function exportPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text(document.getElementById('preview').textContent, 10, 10);
  doc.save('nda.pdf');
}

window.onload = function(){
  const saved = JSON.parse(localStorage.getItem('ndaData')||'{}');
  Object.keys(saved).forEach(k=>{
    if(document.getElementById(k)) document.getElementById(k).value = saved[k];
  });

  togglePartyFields();
  generate();
}
</script>
</body>
</html>
